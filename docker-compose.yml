version: "3.8"

services:
  dashboard:
    build: .
    container_name: bug_bounty_dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app/backend
      - ./app_data:/app/app_data
    environment:
      - PORT=3000
    restart: unless-stopped
    
  # Frontend dev server (run locally or in a separate container)
  frontend:
    image: node:20
    container_name: bug_bounty_frontend
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host"
